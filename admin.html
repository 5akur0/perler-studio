<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拼豆工坊 · 画廊审核</title>
    <meta name="theme-color" content="#eef2f4" />
    <meta name="color-scheme" content="light" />
    <meta name="beam-share-api-base" content="https://beam-prod-d7g2xz88ee6532631-1438742199.ap-shanghai.app.tcloudbase.com" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://beam-prod-d7g2xz88ee6532631-1438742199.ap-shanghai.app.tcloudbase.com https://beam-prod-d7g2xz88ee6532631-1438742199.tcloudbaseapp.com https://fonts.googleapis.com https://fonts.gstatic.com;"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-page">
    <main>
      <header class="admin-header">
        <div class="admin-header-text">
          <h1>图纸画廊审核</h1>
          <p>管理员 token 只会发送给后端校验，不要提交到 GitHub。</p>
        </div>
      </header>

      <section class="admin-toolbar">
        <input id="adminToken" type="password" autocomplete="off" placeholder="ADMIN_TOKEN" aria-label="管理员 Token" />
        <button id="loadButton" class="primary icon-text-button" type="button">
          <span class="btn-glyph" data-lucide-icon="refresh-cw" data-icon-size="16"></span>
          <span class="btn-label">读取</span>
        </button>
      </section>

      <nav class="admin-tabs" id="filterTabs" role="tablist" aria-label="筛选投稿">
        <button class="admin-tab is-active" type="button" role="tab" data-filter="all" aria-selected="true">
          全部 <span class="admin-tab-count" data-count="all">0</span>
        </button>
        <button class="admin-tab" type="button" role="tab" data-filter="pending" aria-selected="false">
          待审核 <span class="admin-tab-count" data-count="pending">0</span>
        </button>
        <button class="admin-tab" type="button" role="tab" data-filter="published" aria-selected="false">
          已发布 <span class="admin-tab-count" data-count="published">0</span>
        </button>
      </nav>

      <div id="status" class="admin-status" role="status" aria-live="polite">输入 token 后点击「读取」。</div>
      <section id="grid" class="admin-grid" aria-live="polite"></section>
    </main>

    <script type="module" src="./admin.js"></script>
</body>
</html>
