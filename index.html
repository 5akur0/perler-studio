<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>拼豆工坊 · 手作拼豆模拟器</title>
    <meta
      name="description"
      content="拼豆工坊是一个静态浏览器小游戏，模拟从选图、取豆、豆筛整理、摆放、检查到熨烫、冷却、收藏分享的完整拼豆手作流程。"
    />
    <meta name="theme-color" content="#eef2f4" />
    <meta name="color-scheme" content="light" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />


    <!-- Open Graph / 社交分享卡片（小红书 / 微信 / Twitter 等）。如需图片预览，请补充 1200×630 的 og-image.png 并取消下方 og:image 注释。 -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="拼豆工坊" />
    <meta property="og:title" content="拼豆工坊 · 手作拼豆模拟器" />
    <meta
      property="og:description"
      content="模拟从选图、取豆、摆放到熨烫、收藏分享的完整拼豆手作流程，在浏览器里做一颗颗治愈的拼豆。"
    />
    <meta property="og:locale" content="zh_CN" />
    <!-- <meta property="og:image" content="og-image.png" /> -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="拼豆工坊 · 手作拼豆模拟器" />
    <meta
      name="twitter:description"
      content="模拟从选图、取豆、摆放到熨烫、收藏分享的完整拼豆手作流程，在浏览器里做一颗颗治愈的拼豆。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Varela+Round&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-lead">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">
              <span></span><span></span><span></span><span></span>
            </div>
            <div class="brand-text">
              <h1>拼豆工坊</h1>
              <p id="statusLine">选择一张图纸，开始今天的手作。</p>
            </div>
          </div>
          <div class="current-pattern" id="currentPatternChip" hidden aria-label="当前图纸">
            <canvas class="current-pattern-thumb" width="44" height="44" aria-hidden="true"></canvas>
            <div class="current-pattern-text">
              <strong id="currentPatternName">樱桃</strong>
              <span id="currentPatternMeta">24×24</span>
            </div>
          </div>
        </div>

        <nav class="workflow-progress" id="workflowProgress" aria-label="流程进度"></nav>

        <div class="top-stats">
          <button class="icon-only-button" id="settingsButton" type="button" title="设置" aria-label="设置">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span class="icon-button-dot" id="settingsDot" hidden></span>
          </button>
          <button class="icon-only-button" id="resetButton" type="button" title="重新开始当前作品" aria-label="重置">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7"/>
              <polyline points="3 4 3 9 8 9"/>
            </svg>
          </button>
        </div>
      </header>

      <main class="studio-grid" id="studioGrid" data-phase="choose">
        <aside class="side-panel left-panel">
          <section data-stage="choose">
            <div class="section-title">
              <span>像素图纸</span>
              <small id="patternMeta"></small>
            </div>
            <div class="pattern-list" id="patternList"></div>
            <div class="custom-inline">
              <label class="check-row">
                <input id="customWhiteToggle" type="checkbox" checked />
                <span>自定义图纸导入时去白底</span>
              </label>
            </div>
          </section>

          <section data-stage="working">
            <div class="side-reference" id="sideReference" aria-label="参考图纸">
              <div class="side-reference-head">
                <span>参考图纸</span>
                <small id="sideReferenceMeta"></small>
              </div>
              <canvas id="sideReferenceCanvas" width="300" height="300" aria-label="左栏图纸"></canvas>
              <div id="sideReferenceLegend" class="side-reference-legend"></div>
            </div>
            <div class="section-title">
              <span id="controlTitle">工具台</span>
              <small id="toolMeta"></small>
            </div>
            <div id="stageControls" class="stage-controls"></div>
            <div id="toolRack" class="tool-rack"></div>
          </section>
        </aside>

        <section class="workbench">
          <section class="choose-preview-panel" data-stage="choose" aria-label="图纸预览区">
            <div class="section-title">
              <span>图纸预览</span>
              <small id="targetCount"></small>
            </div>
            <div class="choose-size-bar">
              <div class="palette-size-picker" id="paletteSizePicker" aria-label="色板规格">
                <span>色板</span>
                <button type="button" data-palette-size="48">48色</button>
                <button type="button" data-palette-size="96">96色</button>
                <button type="button" data-palette-size="221">221色</button>
              </div>
            </div>
            <input id="customImageInput" type="file" accept="image/*" />
            <div class="choose-preview-main">
              <div class="preview-canvas-wrap">
                <div class="preview-canvas-frame">
                  <canvas id="previewCanvas" width="560" height="560" aria-label="当前图纸预览"></canvas>
                </div>
                <div class="size-rail" aria-label="图纸尺寸控制">
                  <span class="size-rail-label">大小</span>
                  <input id="patternSizeSlider" class="size-slider" type="range" min="12" max="48" step="1" value="24" aria-label="图纸大小竖向滑动条" />
                  <strong id="patternSizeValue" class="size-rail-value">24</strong>
                </div>
              </div>
              <aside class="preview-side">
                <div id="patternColorStats" class="pattern-color-stats"></div>
                <div id="customStats" class="custom-stats is-empty"></div>
              </aside>
            </div>
            <div class="choose-preview-actions">
              <button class="primary-button choose-start-button" id="chooseStartButton" type="button">开始拼豆</button>
            </div>
          </section>
          <canvas id="sceneCanvas" width="980" height="690" aria-label="拼豆工作台"></canvas>
          <div id="boardZoomControls" class="board-zoom-controls" hidden>
            <button id="zoomOutButton" class="icon-only-button board-zoom-button" type="button" title="缩小拼豆板" aria-label="缩小拼豆板">−</button>
            <button id="zoomInButton" class="icon-only-button board-zoom-button" type="button" title="放大拼豆板" aria-label="放大拼豆板">+</button>
            <button id="zoomResetButton" class="board-zoom-reset" type="button" title="重置缩放与位置" aria-label="重置缩放与位置">1:1</button>
          </div>
        </section>

        <aside class="side-panel right-panel">
          <section data-stage="working">
            <div class="section-title">
              <span id="rightPanelTitle">豆盒</span>
              <small id="colorMeta"></small>
            </div>
            <div id="colorPalette" class="color-palette"></div>
          </section>
        </aside>
      </main>
    </div>


    <div id="remapModal" class="remap-modal" aria-hidden="true">
      <div class="remap-modal-card remap-picker-modal-card" role="dialog" aria-modal="true" aria-labelledby="remapModalTitle">
        <div class="remap-modal-head">
          <strong id="remapModalTitle">图纸换色</strong>
          <button id="remapModalClose" type="button" aria-label="关闭换色窗口">×</button>
        </div>
        <div id="remapModalBody" class="remap-modal-body"></div>
        <div class="remap-modal-foot">
          <button id="remapResetButton" type="button">恢复原色</button>
          <button id="remapDoneButton" class="primary-button" type="button">完成</button>
        </div>
      </div>
    </div>

    <div id="settingsModal" class="remap-modal" aria-hidden="true">
      <div class="remap-modal-card settings-modal-card" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
        <div class="remap-modal-head">
          <strong id="settingsModalTitle">设置</strong>
          <button id="settingsModalClose" type="button" aria-label="关闭设置窗口">×</button>
        </div>
        <div class="remap-modal-body settings-modal-body">
          <button class="icon-button settings-collection-row" id="collectionButton" data-icon="collection" type="button" title="作品集">
            <span class="icon-button-glyph" aria-hidden="true"></span>
            <span class="icon-button-label">作品集</span>
            <strong class="icon-button-count" id="collectionCount">0</strong>
          </button>
          <label class="bg-picker settings-field">
            <span>背景</span>
            <select id="bgThemeSelect" aria-label="背景颜色">
              <option value="mist">雾青</option>
              <option value="apricot">奶杏</option>
              <option value="sakura">浅樱</option>
              <option value="sky">晴蓝</option>
              <option value="herb">草木</option>
            </select>
          </label>
          <label class="tool-style-picker settings-field">
            <span>工具</span>
            <select id="topToolStyleSelect" aria-label="工具款式"></select>
          </label>
          <a class="settings-link settings-field" href="https://github.com/5akur0/perler-studio" target="_blank" rel="noopener noreferrer" aria-label="查看完整源代码">
            <span>源代码</span>
            <strong>GitHub</strong>
          </a>
          <div class="settings-field settings-sandbox-row">
            <span>沙盒模式</span>
            <button class="ghost-button sandbox-sticker" id="sandboxButton" type="button" title="沙盒：自由拼摆不校验" aria-label="沙盒模式：关"></button>
          </div>
        </div>
      </div>
    </div>

    <div id="collectionModal" class="remap-modal" aria-hidden="true">
      <div class="remap-modal-card collection-modal-card" role="dialog" aria-modal="true" aria-labelledby="collectionModalTitle">
        <div class="remap-modal-head">
          <strong id="collectionModalTitle">作品集</strong>
          <button id="collectionModalClose" type="button" aria-label="关闭作品集窗口">×</button>
        </div>
        <div class="remap-modal-body">
          <div id="collectionPanel" class="collection-panel"></div>
        </div>
      </div>
    </div>

    <div id="shareModal" class="remap-modal" aria-hidden="true">
      <div class="remap-modal-card share-modal-card" role="dialog" aria-modal="true" aria-labelledby="shareModalTitle">
        <div class="remap-modal-head">
          <strong id="shareModalTitle">小红书分享</strong>
          <button id="shareModalClose" type="button" aria-label="关闭分享窗口">×</button>
        </div>
        <div class="remap-modal-body">
          <div id="sharePanel" class="share-panel"></div>
        </div>
      </div>
    </div>

    <!-- Orientation prompt: shown by CSS media query only on touch devices with wrong orientation -->
    <div class="orientation-overlay" aria-live="polite" role="status">
      <svg viewBox="0 0 64 64" width="72" height="72" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <!-- phone silhouette -->
        <rect x="20" y="8" width="24" height="42" rx="4"/>
        <circle cx="32" cy="45" r="1.5" fill="currentColor" stroke="none"/>
        <!-- rotation arrow -->
        <path d="M8 32 C8 16 18 6 34 6"/>
        <polyline points="30 2 34 6 30 10"/>
      </svg>
      <p class="msg-portrait">请将手机竖屏使用</p>
      <p class="msg-landscape">请将平板横屏使用</p>
    </div>

    <div id="achievementToast" class="achievement-toast" role="status" aria-live="polite"></div>
    <div id="placeHint" class="place-hint" role="status" aria-live="polite"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="mard-palette.js"></script>
    <script src="script.js"></script>
  </body>
</html>
