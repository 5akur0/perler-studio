<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拼豆工坊</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
          <div>
            <h1>拼豆工坊</h1>
            <p id="statusLine">选择一张图纸，开始今天的手作。</p>
          </div>
        </div>
        <div class="top-stats">
          <div class="stat-pill">
            <span>作品集</span>
            <strong id="collectionCount">0</strong>
          </div>
          <label class="bg-picker">
            <span>背景</span>
            <select id="bgThemeSelect" aria-label="背景颜色">
              <option value="mist">雾青</option>
              <option value="apricot">奶杏</option>
              <option value="sakura">浅樱</option>
              <option value="sky">晴蓝</option>
              <option value="herb">草木</option>
            </select>
          </label>
          <button class="ghost-button" id="sandboxButton" type="button" title="切换沙盒模式">沙盒关</button>
          <button class="ghost-button" id="resetButton" type="button" title="重新开始当前作品">重置</button>
        </div>
      </header>

      <main class="studio-grid">
        <aside class="side-panel left-panel">
          <section>
            <div class="section-title">
              <span>像素图纸</span>
              <small id="patternMeta"></small>
            </div>
            <div class="pattern-list" id="patternList"></div>
          </section>

          <section>
            <div class="section-title">
              <span>自定义图纸</span>
              <small id="customSizeMeta">24x24</small>
            </div>
            <div class="custom-panel">
              <div class="size-controls">
                <select id="patternSizeSelect" aria-label="图纸尺寸">
                  <option value="16">16x16</option>
                  <option value="24" selected>24x24</option>
                  <option value="32">32x32</option>
                  <option value="40">40x40</option>
                  <option value="48">48x48</option>
                </select>
                <input id="patternSizeInput" type="number" min="12" max="48" value="24" aria-label="自定义尺寸" />
                <button id="patternSizeButton" type="button">应用尺寸</button>
              </div>
              <input id="customImageInput" type="file" accept="image/*" />
              <button id="customImageButton" type="button">导入图片</button>
              <label class="check-row">
                <input id="customWhiteToggle" type="checkbox" checked />
                <span>去白底</span>
              </label>
              <div id="customStats" class="custom-stats">导入图片后显示色号统计</div>
            </div>
          </section>

          <section>
            <div class="section-title">
              <span>流程</span>
              <small id="phaseMeta"></small>
            </div>
            <div class="phase-list" id="phaseList"></div>
          </section>

          <section>
            <div class="section-title">
              <span>图纸预览</span>
              <small id="targetCount"></small>
            </div>
            <canvas id="previewCanvas" width="280" height="220" aria-label="当前图纸预览"></canvas>
          </section>
        </aside>

        <section class="workbench">
          <canvas id="sceneCanvas" width="980" height="690" aria-label="拼豆工作台"></canvas>
        </section>

        <aside class="side-panel right-panel">
          <section>
            <div class="section-title">
              <span id="controlTitle">工具台</span>
              <small id="toolMeta"></small>
            </div>
            <div id="stageControls" class="stage-controls"></div>
            <div id="toolRack" class="tool-rack"></div>
          </section>

          <section>
            <div class="section-title">
              <span>豆盒</span>
              <small id="colorMeta"></small>
            </div>
            <div id="colorPalette" class="color-palette"></div>
          </section>

          <section>
            <div class="section-title">
              <span>状态</span>
              <small id="scoreMeta"></small>
            </div>
            <div id="meterPanel" class="meter-panel"></div>
          </section>

          <section>
            <div class="section-title">
              <span>小红书</span>
              <small>水印图</small>
            </div>
            <div id="sharePanel" class="share-panel"></div>
          </section>

          <section>
            <div class="section-title">
              <span>作品集</span>
              <small>本机保存</small>
            </div>
            <div id="collectionPanel" class="collection-panel"></div>
          </section>
        </aside>
      </main>
    </div>

    <div id="remapModal" class="remap-modal" aria-hidden="true">
      <div class="remap-modal-card" role="dialog" aria-modal="true" aria-labelledby="remapModalTitle">
        <div class="remap-modal-head">
          <strong id="remapModalTitle">官方图纸换色</strong>
          <button id="remapModalClose" type="button" aria-label="关闭换色窗口">X</button>
        </div>
        <div id="remapModalBody" class="remap-modal-body"></div>
        <div class="remap-modal-foot">
          <button id="remapResetButton" type="button">恢复原色</button>
          <button id="remapDoneButton" class="primary-button" type="button">完成</button>
        </div>
      </div>
    </div>

    <div id="controlsModal" class="remap-modal" aria-hidden="true">
      <div class="remap-modal-card controls-modal-card" role="dialog" aria-modal="true" aria-labelledby="controlsModalTitle">
        <div class="remap-modal-head">
          <strong id="controlsModalTitle">操作面板</strong>
          <button id="controlsModalClose" type="button" aria-label="关闭操作窗口">X</button>
        </div>
        <div id="controlsModalBody" class="remap-modal-body"></div>
      </div>
    </div>

    <div id="achievementToast" class="achievement-toast" role="status" aria-live="polite"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="script.js"></script>
  </body>
</html>
