name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Rebuild committed bundles
        run: npm run build
      - name: Fail if committed bundles are stale
        run: git diff --exit-code -- app.bundle.js styles.css
      - name: Run regression suite
        run: npm test
